<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Gestionale Artigiani</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo .icon { font-size: 48px; display: block; margin-bottom: 12px; }
        .logo h1 { color: white; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .logo p { color: #94a3b8; font-size: 14px; margin-top: 6px; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .card h2 { font-size: 20px; color: #111827; margin-bottom: 8px; font-weight: 700; }
        .card .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-size: 14px;
            color: #111827;
            outline: none;
            background: #f9fafb;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
            background: white;
        }

        .divider {
            height: 1px;
            background: #f1f5f9;
            margin: 20px 0;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .btn-submit:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }

        .errore-box {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .successo-box {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .successo-box .icon { font-size: 36px; display: block; margin-bottom: 10px; }
        .successo-box p { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
        .btn-login {
            display: inline-block;
            padding: 11px 24px;
            background: #16a34a;
            color: white;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #15803d; }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .links a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }

        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="logo">
        <span class="icon">🔧</span>
        <h1>Gestionale Artigiani</h1>
        <p>Reimposta la tua password</p>
    </div>

    <div class="card">
        <h2>Reset password</h2>
        <p class="subtitle">Inserisci username e codice invito per reimpostare la password.</p>

        {% if errore %}
        <div class="errore-box">⚠️ {{ errore }}</div>
        {% endif %}

        {% if successo %}
        <div class="successo-box">
            <span class="icon">✅</span>
            <p>{{ successo }}</p>
            <a href="/login" class="btn-login">Vai al login →</a>
        </div>
        {% else %}
        <form method="post" action="/reset-password">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Il tuo username" required autofocus>
            </div>

            <div class="form-group">
                <label>Codice invito</label>
                <input type="text" name="codice_invito" placeholder="Codice fornito dal supporto" required>
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label>Nuova password</label>
                <input type="password" name="nuova_password" placeholder="••••••••" required minlength="6">
            </div>

            <div class="form-group">
                <label>Conferma password</label>
                <input type="password" name="conferma_password" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="btn-submit">Aggiorna password →</button>

        </form>
        {% endif %}

        <div class="links">
            <a href="/login">← Torna al login</a>
        </div>

    </div>

    <p class="footer-note">© 2026 Gestionale Artigiani</p>

</div>

</body>
</html>
