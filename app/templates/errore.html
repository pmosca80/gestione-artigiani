<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Errore — Mastro</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'DM Sans', sans-serif; }

        .error-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 40px 20px;
        }

        .error-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .error-icon {
            font-size: 56px;
            display: block;
            margin-bottom: 20px;
        }

        .error-card h2 {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }

        .error-card p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .error-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            padding: 11px 24px;
            background: #2563eb;
            color: white;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-home:hover { background: #1d4ed8; }

        .btn-back {
            padding: 11px 20px;
            background: #f3f4f6;
            color: #374151;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-back:hover { background: #e5e7eb; }

        .error-code {
            margin-top: 24px;
            font-size: 12px;
            color: #d1d5db;
            font-family: monospace;
        }
    </style>
</head>
<body>

{% include "components/navbar.html" %}

<div class="error-wrap">
    <div class="error-card">

        <span class="error-icon">⚠️</span>

        <h2>Qualcosa è andato storto</h2>

        <p>{{ messaggio or "Si è verificato un errore imprevisto. Riprova tra qualche minuto." }}</p>

        <div class="error-actions">
            <a href="/" class="btn-home">🏠 Torna alla home</a>
            <button onclick="history.back()" class="btn-back">← Indietro</button>
        </div>

        <p class="error-code">Errore 500 — Internal Server Error</p>

    </div>
</div>

</body>
</html>
