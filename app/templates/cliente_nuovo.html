<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuovo cliente — Mastro</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'DM Sans', sans-serif; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-header h1 { font-size: 24px; font-weight: 700; color: #111827; margin: 0; }
        .page-header p { color: #6b7280; font-size: 13px; margin: 4px 0 0; }

        .form-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 32px;
            max-width: 720px;
        }

        .form-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin: 24px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f1f5f9;
        }
        .form-section-title:first-child { margin-top: 0; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-grid.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.span2 { grid-column: span 2; }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #111827;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f9fafb;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: white;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }
        .btn-salva {
            padding: 11px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
        }
        .btn-salva:hover { background: #1d4ed8; }
        .btn-annulla {
            padding: 11px 20px;
            background: #f3f4f6;
            color: #374151;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-annulla:hover { background: #e5e7eb; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.span2 { grid-column: span 1; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>

{% include "components/navbar.html" %}

<div class="container">

    <div class="page-header">
        <div>
            <h1>👤 Nuovo cliente</h1>
            <p>Aggiungi un nuovo cliente all'anagrafica</p>
        </div>
        <a href="/clienti/" class="btn-annulla">← Torna ai clienti</a>
    </div>

    <div class="form-card">
        <form method="post" action="/clienti/nuovo">

            <div class="form-section-title">Tipo cliente</div>
            <div class="form-grid full">
                <div class="form-group">
                    <label>Tipo</label>
                    <select name="tipo_cliente">
                        <option value="privato">Privato</option>
                        <option value="azienda">Azienda</option>
                    </select>
                </div>
            </div>

            <div class="form-section-title">Dati anagrafici</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="Nome" autofocus>
                </div>
                <div class="form-group">
                    <label>Cognome</label>
                    <input type="text" name="cognome" placeholder="Cognome">
                </div>
                <div class="form-group span2">
                    <label>Ragione sociale</label>
                    <input type="text" name="ragione_sociale" placeholder="Solo per aziende">
                </div>
            </div>

            <div class="form-section-title">Contatti</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Telefono</label>
                    <input type="text" name="telefono" placeholder="Es. 333 1234567">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="email@esempio.it">
                </div>
            </div>

            <div class="form-section-title">Indirizzo</div>
            <div class="form-grid">
                <div class="form-group span2">
                    <label>Indirizzo</label>
                    <input type="text" name="indirizzo" placeholder="Via e numero civico">
                </div>
                <div class="form-group">
                    <label>Città</label>
                    <input type="text" name="citta" placeholder="Città">
                </div>
                <div class="form-group">
                    <label>Provincia</label>
                    <input type="text" name="provincia" placeholder="Es. MI" maxlength="2">
                </div>
                <div class="form-group">
                    <label>CAP</label>
                    <input type="text" name="cap" placeholder="Es. 20100" maxlength="5">
                </div>
            </div>

            <div class="form-section-title">Dati fiscali FatturaPA</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Partita IVA</label>
                    <input type="text" name="partita_iva" placeholder="Es. 01234567890" maxlength="11" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>Codice fiscale</label>
                    <input type="text" name="codice_fiscale" placeholder="Es. RSSMRA80A01H501U" maxlength="16">
                </div>
                <div class="form-group">
                    <label>Codice destinatario SDI</label>
                    <input type="text" name="codice_destinatario" placeholder="7 caratteri (es. ABCDE12)" maxlength="7">
                </div>
                <div class="form-group">
                    <label>PEC destinatario</label>
                    <input type="email" name="pec_destinatario" placeholder="pec@esempio.it">
                </div>
            </div>

            <div class="form-section-title">Note</div>
            <div class="form-grid full">
                <div class="form-group">
                    <label>Note interne</label>
                    <textarea name="note" placeholder="Note visibili solo a te..."></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-salva">💾 Salva cliente</button>
                <a href="/clienti/" class="btn-annulla">Annulla</a>
            </div>

        </form>
    </div>

</div>

<script src="/static/validation.js"></script>
</body>
</html>
