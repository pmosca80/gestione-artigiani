<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link scaduto</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #111827;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card {
            background: white; border-radius: 16px; padding: 48px 40px;
            max-width: 460px; width: 90%; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .icon { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #0f172a; }
        p { font-size: 14px; color: #6b7280; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>Link scaduto</h1>
        <p>Questo link al portale non è più valido.<br>
           Contatta chi ti ha inviato il link per riceverne uno aggiornato.</p>
    </div>
</body>
</html>
