<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aggiungi stock — {{ materiale.nome }}</title>
    <link rel="stylesheet" href="/static/style.css?v=157">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap');
        body { font-family: 'DM Sans', sans-serif; background: #f5f7fb; }

        .wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 28px 20px 100px;
        }

        /* banner materiale */
        .mat-banner {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .mat-icon {
            width: 48px; height: 48px;
            background: #eff6ff;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .mat-name { font-size: 16px; font-weight: 700; color: #111827; }
        .mat-stock {
            margin-left: auto;
            text-align: right;
            flex-shrink: 0;
        }
        .mat-stock .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #9ca3af; }
        .mat-stock .val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: #111827; }
        .mat-stock .unit { font-size: 13px; color: #9ca3af; }

        /* form */
        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .big-input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 24px;
            font-family: 'DM Mono', monospace;
            font-weight: 700;
            color: #111827;
            background: white;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }
        .big-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .note-input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #111827;
            background: white;
            outline: none;
            resize: vertical;
            min-height: 70px;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }
        .note-input:focus { border-color: #2563eb; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-submit:active { transform: scale(0.98); background: #15803d; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #6b7280;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>
{% include "components/navbar.html" %}

<div class="wrap">

    <!-- info materiale -->
    <div class="mat-banner">
        <div class="mat-icon">📦</div>
        <div class="mat-name">{{ materiale.nome }}</div>
        <div class="mat-stock">
            <div class="label">Hai adesso</div>
            <div class="val">{{ materiale.quantita or 0 }} <span class="unit">{{ materiale.unita_misura or 'pz' }}</span></div>
        </div>
    </div>

    <form method="post">
        <label class="field-label" for="quantita">Quanta ne aggiungi? ({{ materiale.unita_misura or 'pz' }})</label>
        <input type="number" id="quantita" name="quantita" class="big-input"
               step="0.01" min="0.01" required autofocus
               placeholder="0">

        <label class="field-label" for="note">Note (opzionale)</label>
        <textarea id="note" name="note" class="note-input"
                  placeholder="Es. acquistato da Fornitore X, fattura n. 123..."></textarea>

        <button type="submit" class="btn-submit">✓ Aggiorna scorta</button>
    </form>

    <a class="back-link" href="/materiali/">← Torna al magazzino</a>
</div>
</body>
</html>
