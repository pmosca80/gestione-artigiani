<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Nuovo materiale</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/clienti">Clienti</a>
    <a href="/lavori">Lavori</a>
    <a href="/materiali">Magazzino</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">

    <h1>Nuovo materiale</h1>

    <form method="post">
        <label>Nome materiale</label>
        <input type="text" name="nome" required>

        <label>Categoria</label>
        <input type="text" name="categoria">

        <label>Unità di misura</label>
        <input type="text" name="unita_misura" value="pz">

        <label>Quantità iniziale</label>
        <input type="number" step="0.01" name="quantita" value="0">

        <label>Scorta minima</label>
        <input type="number" step="0.01" name="scorta_minima" value="0">

        <label>Note</label>
        <textarea name="note"></textarea>

        <button>Salva materiale</button>
    </form>

    <p>
        <a class="btn btn-secondary" href="/materiali">Torna al magazzino</a>
    </p>

</div>

</body>
</html>
